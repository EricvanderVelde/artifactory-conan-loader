services:
  postgresql:
    image: postgres:15-alpine
    container_name: artifactory-db
    environment:
      POSTGRES_DB: artifactory
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: password
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  artifactory:
    build: .
    container_name: artifactory
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8081:8081"   # Artifactory API / legacy
      - "8082:8082"   # Artifactory UI / main access
    volumes:
      - artifactory-data:/var/opt/jfrog/artifactory
    environment:
      JF_ROUTER_ENTRYPOINTS_EXTERNALPORT: "8082"
      JF_SHARED_DATABASE_DRIVER: org.postgresql.Driver
      JF_SHARED_DATABASE_TYPE: postgresql
      JF_SHARED_DATABASE_URL: "jdbc:postgresql://postgresql:5432/artifactory"
      JF_SHARED_DATABASE_USERNAME: artifactory
      JF_SHARED_DATABASE_PASSWORD: password
      JF_SHARED_JFCONNECT_ENABLED: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/artifactory/api/system/ping"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 10

volumes:
  postgresql-data:
  artifactory-data:
